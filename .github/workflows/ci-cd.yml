name: 🚀 Zero Downtime — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'devops_odyssey.html'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Set version
        id: version
        run: echo "TAG=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🐳 Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:${{ steps.version.outputs.TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:latest \
            .

      - name: 🔐 Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 📤 Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:${{ steps.version.outputs.TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:latest

      - name: 🔄 Restart container on QNAP
        run: |
          cd /share/CACHEDEV3_DATA/Stuff/Devops-game
          docker compose pull
          docker compose up -d --force-recreate

      - name: 🧹 Cleanup old images
        run: docker image prune -f

      - name: ✅ Done
        run: |
          echo "Deployed version ${{ steps.version.outputs.TAG }}"
          echo "Live at: https://test.davidgman.com"
