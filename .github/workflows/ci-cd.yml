name: 🚀 Zero Downtime — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'zero-downtime.html'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Set version
        id: version
        run: echo "TAG=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🐳 Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:${{ steps.version.outputs.TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:latest \
            .

      - name: 🔐 Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 📤 Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:${{ steps.version.outputs.TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:latest

      - name: 🔄 Restart container on QNAP
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:latest
          # Stop any container using port 32712
          docker ps -q --filter "publish=32712" | xargs -r docker stop
          docker ps -aq --filter "publish=32712" | xargs -r docker rm
          # Also try by name
          docker stop zerodowntime || true
          docker rm zerodowntime || true
          docker run -d \
            --name zerodowntime \
            --restart unless-stopped \
            -p 32712:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/zero-downtime:latest

      - name: 🧹 Cleanup old images
        run: docker image prune -f

      - name: ✅ Done
        run: |
          echo "Deployed version ${{ steps.version.outputs.TAG }}"
          echo "Live at: https://test.davidgman.com"
